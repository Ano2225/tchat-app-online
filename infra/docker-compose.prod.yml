name: babichat

# Production — uses pre-built images from GitHub Container Registry
# Images are built by CI (.github/workflows/deploy.yml)
#
# Usage:
#   docker compose --env-file ../.env -f infra/docker-compose.prod.yml up -d
#
# Required env vars in /opt/babichat/.env — see .env.example

services:
  mongo:
    image: mongo:7
    container_name: babichat-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: babichat
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:?MONGO_ROOT_USER is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - babichat-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --username ${MONGO_ROOT_USER} --password ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin localhost:27017/babichat --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: babichat-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - babichat-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/TON_USERNAME_GITHUB/babichat-backend:latest
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: babichat-backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/babichat?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - babichat-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/TON_USERNAME_GITHUB/babichat-frontend:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SOCKET_URL: https://babichat.tech
        NEXT_PUBLIC_API_URL: https://babichat.tech/api
    container_name: babichat-frontend
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8000
    ports:
      - "127.0.0.1:3000:8000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - babichat-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  umami-db:
    image: postgres:16-alpine
    container_name: babichat-umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:?UMAMI_DB_PASSWORD is required}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    networks:
      - babichat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: babichat-umami
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:?UMAMI_APP_SECRET is required}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - babichat-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/heartbeat || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo-data:
  mongo-config:
  redis-data:
  umami-db-data:

networks:
  babichat-network:
    driver: bridge