services:
  mongo:
    image: mongo:7
    container_name: babichat-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: babichat
    # Bind to localhost only — do not expose to host network in production
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - babichat-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/babichat --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: babichat-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - babichat-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: babichat-mailhog
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"  # SMTP
      - "127.0.0.1:8025:8025"  # Web UI
    networks:
      - babichat-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: babichat-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/babichat
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_password}@redis:6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - babichat-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  umami-db:
    image: postgres:16-alpine
    container_name: babichat-umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami_secret_password}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    networks:
      - babichat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: babichat-umami
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami_secret_password}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-change_this_to_a_random_secret_string}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - babichat-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/heartbeat || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
  redis-data:
    driver: local
  umami-db-data:
    driver: local

networks:
  babichat-network:
    driver: bridge
